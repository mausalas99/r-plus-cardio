name = "rmas-lista-de-espera"
main = "src/index.js"
compatibility_date = "2026-06-01"

[[d1_databases]]
binding = "DB"
database_name = "rplus-equipos"
database_id = "45e5427e-bf49-4881-92e1-526367fa5c74"

[[r2_buckets]]
binding = "PHOTOS"
bucket_name = "rplus-equipos-photos"

[triggers]
crons = ["0 6 * * *"]

[assets]
directory = "../equipos-pages/public"
binding = "ASSETS"

# Custom domain (public URL — no laboratoriazo in the link)
