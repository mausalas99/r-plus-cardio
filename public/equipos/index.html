<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob:; connect-src 'self' http: https: ws: wss:; base-uri 'self'; form-action 'self'" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="R+ Lista de espera" />
  <meta name="theme-color" content="#4a52e8" />
  <link rel="manifest" href="/equipos/manifest.webmanifest?v=14" />
  <script>
    (function () {
      try {
        var m = /[?&]t=([^&]+)/.exec(location.search);
        if (!m) return;
        var t = decodeURIComponent(m[1]);
        localStorage.setItem('rpc-equipos-token', t);
        var secure = location.protocol === 'https:' ? '; Secure' : '';
        document.cookie =
          'rpc-equipos-token=' + encodeURIComponent(t) +
          '; path=/; max-age=31536000; SameSite=Lax' + secure;
      } catch (_e) {}
    })();
  </script>
  <link rel="icon" type="image/png" sizes="192x192" href="/equipos/icons/icon-192.png?v=12" />
  <link rel="apple-touch-icon" href="/equipos/icons/apple-touch-icon.png?v=12" />
  <title>R+ Lista de espera — Lumify / EKG / US</title>
  <link rel="stylesheet" href="/tokens.css" />
  <link rel="stylesheet" href="/styles/overlays.css" />
  <link rel="stylesheet" href="/equipos/equipos.css?v=12" />
</head>
<body class="equipos-body">
  <header class="equipos-topbar">
    <div class="equipos-topbar-inner">
      <div class="equipos-brand" aria-label="R+ Lista de espera">
        <img
          class="equipos-brand-mark"
          src="/equipos/icons/icon-192.png?v=12"
          width="32"
          height="32"
          alt=""
          decoding="async"
        />
        <div class="equipos-brand-text">
          <p class="equipos-brand-title">R+ Lista de espera</p>
          <p class="equipos-brand-sub">Lumify · EKG · Ultrasonido</p>
        </div>
      </div>
      <div class="equipos-topbar-actions">
        <button type="button" class="equipos-admin-btn" id="equipos-admin-btn" hidden>Admin</button>
        <button type="button" class="equipos-inicio-btn" id="equipos-ayuda">Ayuda</button>
        <button type="button" class="equipos-inicio-btn" id="equipos-inicio">Inicio</button>
      </div>
    </div>
  </header>
  <div id="equipos-app" class="equipos-app" tabindex="-1" aria-live="polite"></div>
  <script type="module" src="/equipos/equipos-app.mjs?v=12"></script>
</body>
</html>
