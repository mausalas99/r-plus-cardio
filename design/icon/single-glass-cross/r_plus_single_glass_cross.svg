<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" fill="none">
  <title>R+ single glass cross</title>
  <defs>
    <linearGradient id="field-gradient" x1="512" y1="0" x2="512" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4a52e8"/>
      <stop offset="100%" stop-color="#3b42c9"/>
    </linearGradient>
    <clipPath id="squircle">
      <rect width="1024" height="1024" rx="226" ry="226"/>
    </clipPath>
    <filter id="glass-drop-shadow" x="280" y="180" width="464" height="520" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>
  </defs>
  <g clip-path="url(#squircle)">
    <rect width="1024" height="1024" fill="url(#field-gradient)"/>
    <!-- Single glass piece: sharp-corner cross + rounded base lines at 80% opacity -->
    <g filter="url(#glass-drop-shadow)" fill="#ffffff" opacity="0.8">
      <rect x="456" y="248" width="112" height="308"/>
      <rect x="356" y="456" width="312" height="112"/>
      <rect x="414" y="592" width="196" height="11" rx="5.5"/>
      <rect x="450" y="618" width="124" height="11" rx="5.5"/>
      <rect x="478" y="644" width="68" height="11" rx="5.5"/>
    </g>
  </g>
</svg>
